name: Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install GTK/WebKit dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: gcc
        run: |
          go build -tags production -trimpath \
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" \
            -o "bin/bibla-linux-amd64" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-linux-amd64
          path: bin/bibla-linux-amd64

  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: '1'
          CC: clang
        run: |
          go build -tags production -trimpath \
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" \
            -o "bin/bibla-darwin-arm64" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-darwin-arm64
          path: bin/bibla-darwin-arm64

  build-darwin-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: clang
        run: |
          go build -tags production -trimpath \
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" \
            -o "bin/bibla-darwin-amd64" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-darwin-amd64
          path: bin/bibla-darwin-amd64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: x86_64-w64-mingw32-gcc
        run: |
          go build -tags production -trimpath `
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" `
            -o "bin/bibla-windows-amd64.exe" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-windows-amd64
          path: bin/bibla-windows-amd64.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux-amd64
      - build-darwin-arm64
      - build-darwin-amd64
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true

      - name: Generate checksums
        working-directory: bin
        run: shasum -a 256 bibla* > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/bibla-linux-amd64
            bin/bibla-darwin-arm64
            bin/bibla-darwin-amd64
            bin/bibla-windows-amd64.exe
            bin/SHA256SUMS
