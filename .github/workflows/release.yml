name: Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install GTK/WebKit dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: gcc
        run: |
          go build -tags production -trimpath \
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" \
            -o "bin/bibla-linux-amd64" .

      - name: Build .deb package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG_DIR="bibla_${VERSION}_amd64"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/share/applications"
          mkdir -p "${PKG_DIR}/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "${PKG_DIR}/usr/share/icons/hicolor/128x128/apps"
          mkdir -p "${PKG_DIR}/usr/share/icons/hicolor/64x64/apps"
          mkdir -p "${PKG_DIR}/usr/share/icons/hicolor/48x48/apps"

          cp bin/bibla-linux-amd64 "${PKG_DIR}/usr/bin/bibla"
          cp frontend/public/bible-logo.png "${PKG_DIR}/usr/share/icons/hicolor/256x256/apps/bibla.png"
          cp frontend/public/bible-logo.png "${PKG_DIR}/usr/share/icons/hicolor/128x128/apps/bibla.png"
          cp frontend/public/bible-logo.png "${PKG_DIR}/usr/share/icons/hicolor/64x64/apps/bibla.png"
          cp frontend/public/bible-logo.png "${PKG_DIR}/usr/share/icons/hicolor/48x48/apps/bibla.png"

          cat > "${PKG_DIR}/DEBIAN/postinst" << 'POSTINST'
          #!/bin/sh
          set -e
          gtk-update-icon-cache -f /usr/share/icons/hicolor || true
          update-desktop-database /usr/share/applications || true
          POSTINST
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: bibla
          Version: ${VERSION}
          Section: optional
          Priority: optional
          Architecture: amd64
          Depends: libgtk-4-1 (>= 4.14), libwebkitgtk-6.0-4 (>= 2.44)
          Maintainer: Makutu <makutu@users.noreply.github.com>
          Description: A beautiful Bible reader
            Bibla is a modern, offline Bible reader built with Wails.
            Supports multiple translations, search, bookmarks, notes, and more.
          EOF

          cat > "${PKG_DIR}/usr/share/applications/bibla.desktop" << EOF
          [Desktop Entry]
          Type=Application
          Name=Bibla
          GenericName=Bible Reader
          Comment=A beautiful Bible reader
          Exec=/usr/bin/bibla
          Icon=bibla
          StartupWMClass=org.wails.Bibla
          Categories=Education;Religion;
          Terminal=false
          EOF

          sudo apt-get install -y dpkg-dev
          dpkg-deb --build "${PKG_DIR}"
          mv "${PKG_DIR}.deb" "bin/bibla-${VERSION}-linux-amd64.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-linux-amd64
          path: bin/bibla-linux-amd64

      - name: Upload .deb artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: bibla-linux-amd64-deb
          path: bin/bibla-*-linux-amd64.deb

  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: '1'
          CC: clang
        run: |
          go build -tags production -trimpath \
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" \
            -o "bin/bibla-darwin-arm64" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-darwin-arm64
          path: bin/bibla-darwin-arm64

  build-darwin-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: clang
        run: |
          go build -tags production -trimpath \
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" \
            -o "bin/bibla-darwin-amd64" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-darwin-amd64
          path: bin/bibla-darwin-amd64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate Windows icon and syso
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          wails3 generate icons -input build/appicon.png -windowsfilename build/windows/icon.ico
          wails3 generate syso -arch amd64 -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_amd64.syso

      - name: Build binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: x86_64-w64-mingw32-gcc
        run: |
          go build -tags production -trimpath `
            -ldflags="-w -s -H windowsgui -X main.currentVersion=${{ steps.version.outputs.VERSION }}" `
            -o "bin/bibla-windows-amd64.exe" .
          Remove-Item *.syso

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build WebView2 bootstrapper
        run: |
          curl -L -o build/windows/nsis/MicrosoftEdgeWebview2Setup.exe https://go.microsoft.com/fwlink/p/?LinkId=2124703

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          $env:PATH = "$nsisPath;$env:PATH"
          $binaryPath = Join-Path $env:GITHUB_WORKSPACE "bin/bibla-windows-amd64.exe"
          Write-Host "Binary path: $binaryPath"
          Write-Host "Binary exists: $(Test-Path $binaryPath)"
          Write-Host "Working directory: $(Get-Location)"
          makensis "-DARG_WAILS_AMD64_BINARY=$binaryPath" build/windows/nsis/project.nsi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-windows-amd64
          path: bin/bibla-windows-amd64.exe

      - name: Upload NSIS installer artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: bibla-windows-amd64-installer
          path: bin/bibla-amd64-installer.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux-amd64
      - build-darwin-arm64
      - build-darwin-amd64
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true

      - name: Generate checksums
        working-directory: bin
        run: shasum -a 256 bibla* > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/bibla-linux-amd64
            bin/*-linux-amd64.deb
            bin/bibla-darwin-arm64
            bin/bibla-darwin-amd64
            bin/bibla-windows-amd64.exe
            bin/bibla-amd64-installer.exe
            bin/SHA256SUMS
