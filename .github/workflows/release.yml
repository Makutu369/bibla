name: Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install GTK/WebKit dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: gcc
        run: |
          go build -tags production -trimpath \
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" \
            -o "bin/bibla-linux-amd64" .

      - name: Build .deb package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG_DIR="bibla_${VERSION}_amd64"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/share/applications"
          mkdir -p "${PKG_DIR}/usr/share/icons/hicolor/256x256/apps"

          cp bin/bibla-linux-amd64 "${PKG_DIR}/usr/bin/bibla"

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: bibla
          Version: ${VERSION}
          Section: optional
          Priority: optional
          Architecture: amd64
          Depends: libgtk-4-1 (>= 4.14), libwebkitgtk-6.0-4 (>= 2.44)
          Maintainer: Makutu <makutu@users.noreply.github.com>
          Description: A beautiful Bible reader
            Bibla is a modern, offline Bible reader built with Wails.
            Supports multiple translations, search, bookmarks, notes, and more.
          EOF

          cat > "${PKG_DIR}/usr/share/applications/bibla.desktop" << EOF
          [Desktop Entry]
          Type=Application
          Name=Bibla
          Comment=A beautiful Bible reader
          Exec=/usr/bin/bibla
          Icon=bibla
          Categories=Education;Religion;
          Terminal=false
          EOF

          sudo apt-get install -y dpkg-dev
          dpkg-deb --build "${PKG_DIR}"
          mv "${PKG_DIR}.deb" "bin/bibla-${VERSION}-linux-amd64.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-linux-amd64
          path: bin/bibla-linux-amd64

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-linux-amd64-deb
          path: bin/bibla-*-linux-amd64.deb

  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: '1'
          CC: clang
        run: |
          go build -tags production -trimpath \
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" \
            -o "bin/bibla-darwin-arm64" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-darwin-arm64
          path: bin/bibla-darwin-arm64

  build-darwin-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: clang
        run: |
          go build -tags production -trimpath \
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" \
            -o "bin/bibla-darwin-amd64" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-darwin-amd64
          path: bin/bibla-darwin-amd64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: x86_64-w64-mingw32-gcc
        run: |
          go build -tags production -trimpath `
            -ldflags="-w -s -X main.currentVersion=${{ steps.version.outputs.VERSION }}" `
            -o "bin/bibla-windows-amd64.exe" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibla-windows-amd64
          path: bin/bibla-windows-amd64.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux-amd64
      - build-darwin-arm64
      - build-darwin-amd64
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true

      - name: Generate checksums
        working-directory: bin
        run: shasum -a 256 bibla* > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/bibla-linux-amd64
            bin/*-linux-amd64.deb
            bin/bibla-darwin-arm64
            bin/bibla-darwin-amd64
            bin/bibla-windows-amd64.exe
            bin/SHA256SUMS
